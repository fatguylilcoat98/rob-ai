services:
  - type: web
    name: rob-ai-assistant
    displayName: "Rob AI - Direct Business Strategy Assistant"
    env: node
    plan: starter
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        fromSecret: true
      - key: SUPABASE_URL
        fromSecret: true
      - key: SUPABASE_ANON_KEY
        fromSecret: true
      - key: ENCRYPTION_KEY
        fromSecret: true